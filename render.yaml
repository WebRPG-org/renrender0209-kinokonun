services:
  # 静的サイトとしてデプロイ
  - type: web
    name: kinokonun
    runtime: static
    buildCommand: echo "No build needed"
    staticPublishPath: ./www
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /js/*
        name: Cache-Control
        value: public, max-age=31536000
      - path: /audio/*
        name: Cache-Control
        value: public, max-age=31536000
      - path: /img/*
        name: Cache-Control
        value: public, max-age=31536000
      - path: /fonts/*
        name: Cache-Control
        value: public, max-age=31536000
    envVars:
      - key: NODE_ENV
        value: production
